name: AuRORA Sentinel Auto-Scan

on:
  schedule:
    - cron: '0 */6 * * *'  # ⏰ สั่งรันอัตโนมัติทุกๆ 6 ชั่วโมง
  workflow_dispatch:       # 🔘 อนุญาตให้กดปุ่มรันเองได้จากหน้าเว็บ GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 ดึงโค้ดจาก Repository
        uses: actions/checkout@v3

      - name: 🐍 ติดตั้ง Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # ใช้ Python เวอร์ชั่นใหม่ล่าสุด

      - name: 📦 ติดตั้งเครื่องมือ (Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 รัน OMNI-SENTINEL
        env:
          # 🔑 ดึงกุญแจจากตู้เซฟของ GitHub มาใส่ให้บอท
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python aurora_sentinel_bot.py
